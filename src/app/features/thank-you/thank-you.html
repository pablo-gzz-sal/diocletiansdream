<app-header></app-header>

<main class="mx-auto max-w-4xl px-6 lg:px-8 py-28 text-center">
  <p class="font-[family-name:var(--font-sans)] text-[0.8rem] tracking-[0.2em] uppercase text-ink-60">
    Booking confirmed
  </p>
  <h1 class="mt-4 font-[family-name:var(--font-serif)] font-light text-[2.75rem] leading-[0.95] text-ink">
    Thank you
  </h1>
  <p class="mt-4 font-[family-name:var(--font-sans)] text-[0.95rem] leading-[1.65] text-ink-60">
    Your booking is confirmed. A confirmation email with your tickets and arrival
    details is on its way to you.
  </p>
  <!--
    Filled in at runtime by the TuriTop snippet (src/assets/vendor/turitop-thankyou.js,
    injected by ThankYou) with the booking reference numbers and Download/Print
    ticket links. The ids and class names are the vendor's — fill_tickets()
    looks them up by id, so they cannot be renamed.

    It writes via insertAdjacentHTML, so its nodes never get Angular's
    _ngcontent attribute and component-scoped CSS would not reach them: the
    .turitop_* styles live in src/styles.css instead.

    Empty until then, and stays empty for anyone opening this page without a
    booking in the query string.
  -->
  <div class="turitop_thank_you_page_wrap">
    <div id="turitop_thank_you_page_tickets" class="turitop_thank_you_page_tickets"></div>
  </div>

  <p class="mt-4 font-[family-name:var(--font-sans)] text-[0.95rem] leading-[1.65] text-ink-60">
    We are just outside the palace walls near the Golden Gate. Please arrive five
    minutes before your slot.
  </p>
  <a
    routerLink="/visit"
    class="inline-block mt-8 font-[family-name:var(--font-sans)] text-[0.8rem] underline underline-offset-4 text-ink hover:opacity-50 transition-opacity"
  >
    How to find us
  </a>
</main>

<app-footer></app-footer>
