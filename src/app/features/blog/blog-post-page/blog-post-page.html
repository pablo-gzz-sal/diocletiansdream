<section class="bg-white">
  <div class="mx-auto max-w-4xl px-4 sm:px-6 lg:px-8">
    <!-- Top nav -->
    <div class="pt-8">
      <a
        routerLink="/blog"
        class="inline-flex items-center gap-2 text-xs uppercase tracking-[0.22em] text-neutral-600 hover:text-neutral-900"
      >
        <span class="text-lg leading-none">←</span>
        Back to journal
      </a>
    </div>

    @if (loading) {
      <div class="py-12 sm:py-16">
        <div class="h-3 w-32 bg-neutral-100"></div>
        <div class="mt-4 h-10 w-3/4 bg-neutral-100"></div>
        <div class="mt-3 h-10 w-2/3 bg-neutral-100"></div>
        <div class="mt-8 aspect-[16/9] w-full bg-neutral-100"></div>
        <div class="mt-8 h-4 w-full bg-neutral-100"></div>
        <div class="mt-3 h-4 w-11/12 bg-neutral-100"></div>
        <div class="mt-3 h-4 w-10/12 bg-neutral-100"></div>
      </div>
    }
    <!-- Loading -->

    @if (!loading && !post ) {
            <!-- Not found -->
    <div  class="py-16">
      <h1 class="text-2xl text-neutral-900">Post not found</h1>
      <p class="mt-2 text-neutral-600">The article may have been removed or the link is wrong.</p>
      <a routerLink="/blog" class="mt-6 inline-block underline text-neutral-900">Go back</a>
    </div>
    }

    @if (!loading && post) {
            <article  class="pb-20">
      <header class="pt-10 sm:pt-14">
        <p class="text-xs uppercase tracking-[0.22em] text-neutral-500">
          {{ dateLabel(post) }}
        </p>

        <h1 class="mt-4 text-4xl sm:text-5xl leading-[1.08] tracking-tight text-neutral-900">
          {{ titleText(post) }}
        </h1>

        <div class="mt-8 h-px w-full bg-neutral-200"></div>
      </header>

      <div class="mt-8 overflow-hidden border border-neutral-200">
        <img
          *ngIf="featuredImage(post) as img; else heroPlaceholder"
          [src]="img"
          [alt]="titleText(post)"
          class="aspect-[16/9] w-full object-cover"
        />
        <ng-template #heroPlaceholder>
          <div class="aspect-[16/9] w-full bg-neutral-100"></div>
        </ng-template>
      </div>

      <!-- Editorial body -->
      <div class="mt-10 leading-relaxed text-neutral-800">
        <!-- The wrapper below provides decent defaults without typography plugin -->
        <div
          class="[&_p]:my-5 [&_p]:text-[16px] sm:[&_p]:text-[17px] [&_p]:leading-relaxed [&_h2]:mt-10 [&_h2]:mb-4 [&_h2]:text-2xl [&_h2]:tracking-tight [&_h3]:mt-8 [&_h3]:mb-3 [&_h3]:text-xl [&_h3]:tracking-tight [&_ul]:my-6 [&_ul]:pl-6 [&_ul]:list-disc [&_ol]:my-6 [&_ol]:pl-6 [&_ol]:list-decimal [&_a]:underline [&_a]:decoration-neutral-300 hover:[&_a]:decoration-neutral-700 [&_blockquote]:my-8 [&_blockquote]:border-l [&_blockquote]:border-neutral-300 [&_blockquote]:pl-6 [&_blockquote]:text-neutral-700"
          [innerHTML]="contentHtml(post)"
        ></div>
      </div>

      <div class="mt-12 h-px w-full bg-neutral-200"></div>

      <div class="mt-8">
        <a
          routerLink="/booking"
          class="inline-flex items-center justify-center rounded-full border border-neutral-900 px-6 py-3 text-xs uppercase tracking-[0.22em] text-neutral-900 hover:bg-neutral-900 hover:text-white transition-colors"
        >
          Book an experience
        </a>
      </div>
    </article>
    }

    <!-- Content -->
  </div>
</section>
