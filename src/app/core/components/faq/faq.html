<section class="faq">
  <div class="faq-inner">

    <!-- Left: heading + hint -->
    <div class="faq-left" revealOnScroll [revealDelay]="0">
      <p class="eyebrow">{{ 'home.newsletter.submit' | translate }}</p>
      <h2 class="section-h2">{{ 'home.newsletter.title' | translate }}</h2>
      <p class="faq-hint">{{ 'home.newsletter.text' | translate }}</p>
    </div>

    <!-- Right: newsletter + FAQ accordion -->
    <div class="faq-list" revealOnScroll [revealDelay]="0.15">

      <!-- Newsletter form item -->
      <div class="faq-item faq-item--open">
        <div class="faq-a" [style.maxHeight]="'none'" [style.opacity]="'1'">
          <form class="newsletter-form" (ngSubmit)="onSubscribe()" #f="ngForm">
            <div class="newsletter-pill">
              <svg class="newsletter-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/>
                <path d="M2 7l8 5.5 8-5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <input
                class="newsletter-input"
                type="email"
                name="email"
                [(ngModel)]="newsletterEmail"
                required
                [placeholder]="'home.newsletter.emailPlaceholder' | translate"
                autocomplete="email"
              />
              <button
                class="newsletter-btn"
                type="submit"
                [disabled]="f.invalid"
              >
                {{ 'home.newsletter.submit' | translate }}
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- FAQ accordion items -->
      <div
        *ngFor="let item of faqs; let i = index"
        class="faq-item"
        [class.faq-item--open]="item.open"
      >
        <button
          class="faq-q"
          (click)="toggleFaq(i)"
          [attr.aria-expanded]="item.open"
        >
          <span>{{ item.q }}</span>
          <span class="faq-icon" aria-hidden="true">
            <svg class="faq-chevron" width="11" height="11" viewBox="0 0 11 11" fill="none">
              <path d="M1.5 3.5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
        <div
          class="faq-a"
          role="region"
        >
          <p>{{ item.a }}</p>
        </div>
      </div>

    </div>
  </div>
</section>
