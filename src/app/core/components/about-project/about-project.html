  <section class="about">
    <div class="about-inner">
      <div class="about-heading">
        <p class="eyebrow">{{ 'home.story.cta' | translate }}</p>
        <h2 class="about-h2">{{ 'home.story.title' | translate }}</h2>
      </div>

      <div class="bento">
        <div class="bento-cell bento-cell--imgA" style="grid-column: 1 / 6; grid-row: 1 / 2">
          <div class="bento-img-placeholder">Project / team / production still</div>
        </div>

        <div class="bento-cell bento-cell--text" style="grid-column: 6 / 13; grid-row: 1 / 2">
          <p class="bento-copy">{{ 'home.story.p1' | translate }}</p>
          <p class="bento-copy" style="margin-top: 1rem">{{ 'home.story.p2' | translate }}</p>

          <a routerLink="/about" class="btn btn--dark" style="margin-top: 2rem">
            {{ 'home.story.cta' | translate }}
          </a>
        </div>
      </div>
    </div>
