<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 font-[family-name:var(--font-serif)]"
  [class]="scrolled() ? 'backdrop-blur-md shadow-[0_1px_0_var(--color-ink-08)]' : 'bg-transparent'"
  [style.background]="scrolled() ? 'var(--cream-95)' : 'transparent'"
>
  <div class="mx-auto max-w-7xl px-5 sm:px-6 lg:px-8">
    <div class="h-16 flex items-center justify-between gap-8">
      <!-- ── Logo ── -->
      <a
        routerLink="/"
        (click)="closeMenu()"
        class="flex items-center gap-2.5 no-underline shrink-0 group"
      >
        <img
          src="assets/images/ddLogo.png"
          class="h-9 w-9 rounded-[0.5rem] transition-opacity group-hover:opacity-75"
          alt="Diocletian's Dream"
        />
        <span
          class="hidden sm:block font-[family-name:var(--font-serif)] text-[1.05rem] font-medium leading-none group-hover:opacity-60 transition-opacity"
          style="color: var(--color-ink)"
        >
          Diocletian's Dream
        </span>
      </a>

      <!-- ── Desktop nav ── -->
      <nav class="hidden md:flex items-center gap-0.5 flex-1 justify-center">
        <a
          routerLink="/"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link text-[0.78rem] font-medium rounded-[0.625rem] px-3.5 py-2 transition-colors no-underline"
          style="color: var(--color-ink-60)"
        >
          Home
        </a>
        <a
          routerLink="/about"
          routerLinkActive="is-active"
          class="nav-link text-[0.78rem] font-medium rounded-[0.625rem] px-3.5 py-2 transition-colors no-underline"
          style="color: var(--color-ink-60)"
        >
          About
        </a>
        <a
          routerLink="/experience"
          routerLinkActive="is-active"
          class="nav-link text-[0.78rem] font-medium rounded-[0.625rem] px-3.5 py-2 transition-colors no-underline"
          style="color: var(--color-ink-60)"
        >
          Experience
        </a>
        <a
          routerLink="/blog"
          routerLinkActive="is-active"
          class="nav-link text-[0.78rem] font-medium rounded-[0.625rem] px-3.5 py-2 transition-colors no-underline"
          style="color: var(--color-ink-60)"
        >
          Blog
        </a>
        <a
          routerLink="/visit"
          routerLinkActive="is-active"
          class="nav-link text-[0.78rem] font-medium rounded-[0.625rem] px-3.5 py-2 transition-colors no-underline"
          style="color: var(--color-ink-60)"
        >
          Visit us
        </a>
      </nav>

      <button
        type="button"
        (click)="toggleLang()"
        class="hidden lg:flex items-center gap-1.5 rounded-xl bg-card px-3 py-2 text-xs font-medium text-fg ring-1 ring-border hover:bg-white/10 transition-colors"
        aria-label="Toggle language"
      >
        <img
          [src]="
            currentLang() === 'en'
              ? 'https://flagcdn.com/w20/hr.png'
              : 'https://flagcdn.com/w20/gb.png'
          "
          [alt]="currentLang() === 'en' ? 'Hrvatski' : 'English'"
          width="20"
          height="14"
          class="rounded-sm object-cover"
        />
        <span>{{ currentLang() === 'en' ? 'HR' : 'EN' }}</span>
      </button>

      <!-- ── Desktop Book CTA ── -->
      <a
        routerLink="/booking"
        class="hidden md:inline-flex items-center justify-center shrink-0 rounded-full px-5 py-2 text-[0.75rem] font-medium tracking-[0.03em] hover:opacity-80 transition-opacity no-underline"
        style="background: var(--color-ink); color: var(--color-warm)"
      >
        Book now
      </a>

      <!-- ── Mobile hamburger ── -->
      <button
        class="md:hidden flex flex-col justify-center gap-[5px] w-9 h-9 rounded-[0.625rem] hover:bg-black/[0.05] transition-colors bg-transparent border-none cursor-pointer p-2 relative z-[70] shrink-0"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Toggle menu"
        type="button"
      >
        <span
          class="block h-px w-full rounded-full transition-all duration-300 origin-center"
          style="background: var(--color-ink)"
          [class]="menuOpen() ? 'rotate-45 translate-y-[6px]' : ''"
        ></span>
        <span
          class="block h-px w-full rounded-full transition-all duration-200"
          style="background: var(--color-ink)"
          [class]="menuOpen() ? 'opacity-0 scale-x-0' : 'opacity-100'"
        ></span>
        <span
          class="block h-px w-full rounded-full transition-all duration-300 origin-center"
          style="background: var(--color-ink)"
          [class]="menuOpen() ? '-rotate-45 -translate-y-[6px]' : ''"
        ></span>
      </button>
    </div>
  </div>
</header>

<div
  class="fixed inset-0 z-[60] md:hidden"
  [ngClass]="menuOpen() ? 'pointer-events-auto' : 'pointer-events-none'"
>
  <!-- ── Backdrop ── -->
  <div
    class="absolute inset-0 bg-ink/50 backdrop-blur-sm transition-opacity duration-300"
    [ngClass]="menuOpen() ? 'opacity-100' : 'opacity-0'"
    (click)="closeMenu()"
  ></div>

  <!-- ── Slide panel ── -->
  <div
    class="absolute top-3 bottom-3 right-3 w-[82%] max-w-xs rounded-[2rem] bg-cream shadow-[0_32px_80px_rgba(26,24,20,0.22)] border border-black/8 overflow-hidden flex flex-col transition-all duration-[350ms]"
    style="transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1)"
    [ngClass]="menuOpen() ? 'translate-x-0 opacity-100' : 'translate-x-[110%] opacity-0'"
  >
    <!-- grain -->
    <div class="grain-overlay pointer-events-none absolute inset-0 opacity-[0.15]"></div>

    <!-- warm blob -->
    <div
      class="pointer-events-none absolute -top-20 -right-20 w-48 h-48 rounded-full opacity-50 blur-[60px]"
      style="background: radial-gradient(circle, #d4b896 0%, transparent 70%)"
    ></div>

    <!-- top bar: logo + close -->
    <div
      class="relative z-10 flex items-center justify-between px-5 pt-5 pb-4 border-b border-black/8"
    >
      <a routerLink="/" (click)="closeMenu()" class="flex items-center gap-2 no-underline">
        <span class="block w-6 h-6 rounded-[0.4rem] bg-ink shrink-0"></span>
        <span
          class="font-[family-name:var(--font-serif)] text-[0.95rem] font-medium text-ink leading-none"
        >
          Diocletian's Dream
        </span>
      </a>
      <button
        (click)="closeMenu()"
        class="w-8 h-8 rounded-[0.5rem] border border-black/10 bg-white/60 flex items-center justify-center cursor-pointer hover:bg-white transition-colors"
        aria-label="Close menu"
      >
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path
            d="M1 1l10 10M11 1L1 11"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>

    <!-- nav links -->
    <nav class="relative z-10 flex flex-col px-3 pt-4 flex-1">
      <a
        routerLink="/"
        routerLinkActive="bg-ink text-warm"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
        class="group flex items-center justify-between rounded-[1rem] px-4 py-3.5 hover:bg-black/5 transition-colors no-underline"
      >
        <span
          class="font-[family-name:var(--font-serif)] text-[1.4rem] font-light tracking-[-0.01em] text-ink"
          >Home</span
        >
        <span class="text-[0.7rem] text-ink-60 group-hover:translate-x-1 transition-transform"
          >→</span
        >
      </a>

      <a
        routerLink="/booking"
        routerLinkActive="bg-ink text-warm"
        (click)="closeMenu()"
        class="group flex items-center justify-between rounded-[1rem] px-4 py-3.5 hover:bg-black/5 transition-colors no-underline"
      >
        <span
          class="font-[family-name:var(--font-serif)] text-[1.4rem] font-light tracking-[-0.01em] text-ink"
          >Tickets</span
        >
        <span class="text-[0.7rem] text-ink-60 group-hover:translate-x-1 transition-transform"
          >→</span
        >
      </a>

      <a
        routerLink="/about"
        routerLinkActive="bg-ink text-warm"
        (click)="closeMenu()"
        class="group flex items-center justify-between rounded-[1rem] px-4 py-3.5 hover:bg-black/5 transition-colors no-underline"
      >
        <span
          class="font-[family-name:var(--font-serif)] text-[1.4rem] font-light tracking-[-0.01em] text-ink"
          >About</span
        >
        <span class="text-[0.7rem] text-ink-60 group-hover:translate-x-1 transition-transform"
          >→</span
        >
      </a>

      <a
        routerLink="/experience"
        routerLinkActive="bg-ink text-warm"
        (click)="closeMenu()"
        class="group flex items-center justify-between rounded-[1rem] px-4 py-3.5 hover:bg-black/5 transition-colors no-underline"
      >
        <span
          class="font-[family-name:var(--font-serif)] text-[1.4rem] font-light tracking-[-0.01em] text-ink"
          >Experience</span
        >
        <span class="text-[0.7rem] text-ink-60 group-hover:translate-x-1 transition-transform"
          >→</span
        >
      </a>

      <a
        routerLink="/blog"
        routerLinkActive="bg-ink text-warm"
        (click)="closeMenu()"
        class="group flex items-center justify-between rounded-[1rem] px-4 py-3.5 hover:bg-black/5 transition-colors no-underline"
      >
        <span
          class="font-[family-name:var(--font-serif)] text-[1.4rem] font-light tracking-[-0.01em] text-ink"
          >Blog</span
        >
        <span class="text-[0.7rem] text-ink-60 group-hover:translate-x-1 transition-transform"
          >→</span
        >
      </a>

      <a
        routerLink="/visit"
        routerLinkActive="bg-ink text-warm"
        (click)="closeMenu()"
        class="group flex items-center justify-between rounded-[1rem] px-4 py-3.5 hover:bg-black/5 transition-colors no-underline"
      >
        <span
          class="font-[family-name:var(--font-serif)] text-[1.4rem] font-light tracking-[-0.01em] text-ink"
          >Visit us</span
        >
        <span class="text-[0.7rem] text-ink-60 group-hover:translate-x-1 transition-transform"
          >→</span
        >
      </a>

      <button
        type="button"
        (click)="toggleLang()"
        class="lg:hidden flex justify-center items-center text-center gap-1.5 rounded-xl bg-card px-3 py-2 text-xs font-medium text-fg ring-1 ring-border hover:bg-white/10 transition-colors"
        aria-label="Toggle language"
      >
        <img
          [src]="
            currentLang() === 'en'
              ? 'https://flagcdn.com/w20/hr.png'
              : 'https://flagcdn.com/w20/gb.png'
          "
          [alt]="currentLang() === 'en' ? 'Hrvatski' : 'English'"
          width="20"
          height="14"
          class="rounded-sm object-cover"
        />
        <span>{{ currentLang() === 'en' ? 'HR' : 'EN' }}</span>
      </button>
    </nav>

    <!-- bottom section -->
    <div class="relative z-10 px-5 pb-5 pt-4 border-t border-black/8 flex flex-col gap-4">
      <!-- book CTA -->
      <a
        routerLink="/booking"
        (click)="closeMenu()"
        class="flex items-center justify-center rounded-full bg-ink text-warm py-3 text-[0.8rem] font-medium hover:opacity-85 transition-opacity no-underline"
      >
        Book tickets →
      </a>

      <!-- info strip -->
      <div class="flex gap-5 text-[0.68rem] text-ink-60">
        <div>
          <p class="font-medium tracking-[0.1em] uppercase text-[0.55rem] mb-0.5 text-ink-60/70">
            Location
          </p>
          <p>Zagrebačka ulica 1</p>
        </div>
        <div>
          <p class="font-medium tracking-[0.1em] uppercase text-[0.55rem] mb-0.5 text-ink-60/70">
            Hours
          </p>
          <p>Mon–Sun · 10–18h</p>
        </div>
      </div>
    </div>
  </div>
</div>
