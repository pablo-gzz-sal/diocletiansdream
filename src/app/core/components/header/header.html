<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [ngClass]="scrolled() ? 'backdrop-blur bg-white/70 shadow-sm' : 'bg-transparent'"
>
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="h-16 flex items-center justify-between">
      <a routerLink="/" class="flex items-center gap-2">
        <span class="h-8 w-8 rounded-2xl bg-black"></span>
        <span class="font-semibold tracking-tight">Diocletian’s Dream</span>
      </a>

      <nav class="hidden md:flex items-center gap-8 text-sm">
        <a
          routerLink="/"
          routerLinkActive="opacity-100"
          class="opacity-80 hover:opacity-100 transition"
          >Home</a
        >
        <a
          routerLink="/blog"
          routerLinkActive="opacity-100"
          class="opacity-80 hover:opacity-100 transition"
          >Blog</a
        >
        <a href="#about" class="opacity-80 hover:opacity-100 transition">About</a>
        <a href="#faq" class="opacity-80 hover:opacity-100 transition">FAQ</a>
        <a href="#contact" class="opacity-80 hover:opacity-100 transition">Contact</a>
      </nav>

      <div class="hidden md:flex items-center gap-3">
        <a
          routerLink="/booking"
          class="inline-flex items-center justify-center rounded-full px-5 py-2 text-sm font-medium bg-black text-white hover:opacity-90 transition"
        >
          Book now
        </a>
      </div>

      <button
        class="md:hidden rounded-xl p-2 hover:bg-black/5 transition"
        (click)="menuOpen.set(!menuOpen())"
        aria-label="Open menu"
      >
        <div class="space-y-1.5">
          <span class="block h-0.5 w-6 bg-black"></span>
          <span class="block h-0.5 w-6 bg-black"></span>
          <span class="block h-0.5 w-6 bg-black"></span>
        </div>
      </button>
    </div>

    @if (menuOpen()) {
      <div class="md:hidden pb-4">
        <div class="rounded-3xl bg-white/90 backdrop-blur border border-black/10 p-4 space-y-3">
          <a href="#experience" class="opacity-80 hover:opacity-100 transition">Experience</a>
          <a href="#visit" class="opacity-80 hover:opacity-100 transition">Plan your visit</a>
          <a
            routerLink="/blog"
            routerLinkActive="opacity-100"
            class="opacity-80 hover:opacity-100 transition"
            >Blog</a
          >
          <a href="#faq" class="opacity-80 hover:opacity-100 transition">FAQ</a>
          <a routerLink="/booking" class="...">Book tickets</a>
        </div>
      </div>
    }
  </div>
</header>
