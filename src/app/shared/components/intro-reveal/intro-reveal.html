<div #spacer class="h-[140vh]"></div>

<section #overlay class="fixed inset-0 z-[998] overflow-hidden will-change-transform">
  <div #image class="absolute inset-0">
    <img
      src="assets/images/heroAnimation.jpg"
      alt="Diocletian's Dream hero"
      class="h-full w-full object-cover intro-img"
      loading="eager"
      fetchpriority="high"
    />
    <div class="absolute inset-0 intro-overlay"></div>
    <div class="absolute inset-0 intro-vignette"></div>
  </div>

  <!-- Safe viewport height wrapper for iOS -->
  <div class="intro-viewport">
    <div #content class="relative z-10 flex h-full items-center justify-center px-6">
      <div class="max-w-4xl text-center">
        <p class="intro-kicker">
          {{ 'home.hero.title' | translate }}
        </p>

        <h1 class="intro-title">
          DIOCLETIAN’S<br />
          DREAM
        </h1>

        <p class="intro-sub">
          {{ 'home.hero.subtitle' | translate }}
        </p>

        <div class="intro-scroll" aria-label="Scroll down">
          <div class="mouse" aria-hidden="true">
            <span class="wheel"></span>
          </div>
          <span class="scroll-label">Scroll</span>
        </div>
      </div>
    </div>
  </div>
</section>
